# =============================================================================
# hello-cicd CHART DEFAULTS (the contract).
# This chart is a PURE, REUSABLE implementation. It contains NO environment-
# specific values. Each environment supplies its own values file from
# ../../environments/<env>/values.yaml (referenced by that env's ArgoCD app).
# These defaults are only sane fallbacks the templates need to render.
# =============================================================================

image:
  repository: 025037641706.dkr.ecr.us-east-1.amazonaws.com/hello-cicd
  tag: "latest"          # ALWAYS overridden by an environment's values
  pullPolicy: IfNotPresent

env:
  name: REPLACE_ME       # supplied per environment
  namespace: REPLACE_ME  # supplied per environment

replicaCount: 2

resources:
  requests: { cpu: 25m, memory: 32Mi }
  limits:   { cpu: 100m, memory: 64Mi }

imagePullSecret: ecr-pull

route:
  host: ""

createNamespace: true

nameOverride: ""
fullnameOverride: ""
