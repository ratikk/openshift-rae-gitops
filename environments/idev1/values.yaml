# =============================================================================
# idev1 ENVIRONMENT — owns what's different about idev1.
# This file lives OUTSIDE the chart (the chart is pure implementation).
# The idev1 ArgoCD Application points its Helm valueFiles at THIS file.
#
# To PROMOTE a release into idev1: change image.tag below, commit, push.
# ArgoCD redeploys ONLY idev1.
# =============================================================================
env:
  name: idev1
  namespace: idev1

image:
  tag: "120"          # ← THE promotion knob for idev1

# (idev1 could also override replicaCount, resources, route.host here if it
#  needed to differ — but it doesn't, so it inherits the chart defaults.)
