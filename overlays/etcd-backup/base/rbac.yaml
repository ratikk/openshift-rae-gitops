# The backup approach here runs the OpenShift-supported cluster-backup.sh ON a master
# via hostPath, rather than exec-ing into etcd pods remotely. That means the SA does NOT
# need pods/exec in openshift-etcd; it needs to (a) use the privileged SCC and (b) be
# schedulable on a control-plane node. We keep cluster read minimal.
#
# If you instead prefer the remote `etcdctl snapshot save` via `oc exec` approach,
# swap this for a Role in openshift-etcd granting pods/get,list + pods/exec — but the
# hostPath cluster-backup.sh route is the Red Hat-documented one and avoids cert plumbing.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etcd-backup-scc
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["privileged"]
    verbs: ["use"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: etcd-backup-scc
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: etcd-backup-scc
subjects:
  - kind: ServiceAccount
    name: etcd-backup
    namespace: openshift-etcd-backup
