# Lab Vault in DEV MODE — auto-unsealed, in-memory storage, root token = "root".
# DO NOT USE THIS PATTERN IN PRODUCTION. It exists to simulate HHS Vault for ESO.
#
# Production Vault would use Raft/Integrated Storage, KMS auto-unseal, real
# auth methods (Kubernetes auth, AppRole), and policy-scoped tokens.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault-system
data:
  vault.hcl: |
    storage "inmem" {}
    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = true
    }
    ui = true
