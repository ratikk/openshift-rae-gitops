# =============================================================================
# apps/vault.yaml — Argo CD Application for HashiCorp Vault on OpenShift
#
# ============================== LAB-ONLY POSTURE ==============================
# Currently configured for server.dev mode (in-memory storage, auto-unseal,
# fixed root token = "root"). Required because this cluster does not yet
# have a StorageClass provisioner installed (platform: none install means
# cluster-storage-operator doesn't auto-install AWS EBS CSI driver).
#
# NEXT-SESSION WORK:
#   1. Install upstream Kubernetes-SIGs AWS EBS CSI Helm chart via a new
#      overlays/storage/base + apps/storage.yaml. This creates a gp3-csi
#      StorageClass for the cluster.
#   2. Switch Vault below from server.dev.enabled=true to:
#         server.dev.enabled: false
#         server.standalone.enabled: true
#         server.standalone.config: (Raft config block we had before)
#         server.dataStorage:
#           enabled: true
#           size: 10Gi
#           storageClass: gp3-csi
#   3. The bootstrap Job (still in overlays/vault/base) will then handle
#      init + unseal + k8s auth method setup against the persistent Vault.
#
# IMPACT OF DEV MODE TONIGHT:
#   - Vault data lost on every pod restart (no persistence)
#   - k8s auth method config also lost on restart — bootstrap Job re-runs
#     each Argo sync as a PostSync hook, so config is re-applied
#   - Root token is the literal string "root" — NEVER use this in production
#
# DEV MODE IS PRODUCTION-INAPPROPRIATE BUT LAB-COMPLETE. Accepted to unblock
# Stage 1 acceptance while storage infrastructure is built properly later.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # Source 1: The official HashiCorp Vault Helm chart in dev mode
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: 0.29.1
      helm:
        releaseName: vault
        values: |
          global:
            openshift: true
            tlsDisable: true

          server:
            # ====== DEV MODE: lab only ======
            # In-memory storage, auto-initialized, auto-unsealed.
            # Switch to standalone+raft+dataStorage in next session.
            dev:
              enabled: true
              devRootToken: "root"

            # These sections are no-ops while dev.enabled=true but kept
            # as breadcrumbs for next session's switchover:
            ha:
              enabled: false
            standalone:
              enabled: false
            dataStorage:
              enabled: false

            serviceAccount:
              create: true
              name: vault
              annotations: {}

            readinessProbe:
              enabled: true

          injector:
            enabled: false

          ui:
            enabled: true
            serviceType: ClusterIP

    # Source 2: Our overlay (namespace labels, SCC binding, bootstrap job)
    - repoURL: https://github.com/ratikk/openshift-rae-gitops.git
      targetRevision: main
      path: overlays/vault/base

  destination:
    server: https://kubernetes.default.svc
    namespace: vault-system

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
