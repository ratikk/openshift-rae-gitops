# =============================================================================
# operatorconfig.yaml — Triggers Layer 2 ESO controller deployment
#
# The community-operators ESO package uses a two-layer architecture:
#   Layer 1 (wrapper): external-secrets-operator-controller-manager
#                      Helm-based operator that watches OperatorConfig CRs.
#                      Installed by the Subscription above.
#   Layer 2 (actual):  The real ESO controller that processes ExternalSecret,
#                      ClusterSecretStore, SecretStore, PushSecret, etc.
#                      Only deploys when an OperatorConfig CR exists.
#
# Without this file, Layer 1 runs but nothing actually reconciles secret
# objects. ClusterSecretStore created above never gets a status because
# no controller is watching it.
#
# spec: {} means "use chart defaults" — single controller replica,
# unrestricted namespace watch, default resource requests. Override
# specific fields here if needed (e.g., spec.replicaCount: 2 for HA).
# =============================================================================
---
apiVersion: operator.external-secrets.io/v1alpha1
kind: OperatorConfig
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    # Wave 3: after the wrapper (wave 0) is installed and its CRDs are
    # registered, before ClusterSecretStore (wave 5) needs a working
    # controller to reconcile against.
    argocd.argoproj.io/sync-wave: "3"
spec: {}
