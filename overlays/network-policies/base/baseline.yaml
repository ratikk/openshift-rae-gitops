# Baseline policies applied to each protected namespace:
#   1. default-deny-all (ingress + egress)
#   2. allow-same-namespace (pods can talk within their own ns)
#   3. allow-dns-egress (so pods can resolve via openshift-dns — without this,
#      everything silently breaks on name resolution)
#   4. allow-monitoring-ingress (so Prometheus in openshift-monitoring can scrape)
#
# Namespaces covered: vault-system, openshift-gitops, external-secrets, openshift-monitoring.
# Cross-component allows (e.g. ESO -> Vault) live in cross-namespace.yaml.
#
# sync-wave +5 so namespaces/labels settle first (these are existing namespaces, but the
# wave keeps ordering deterministic if anything here is templated later).
---
# ============ vault-system ============
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vault-system
  annotations: { argocd.argoproj.io/sync-wave: "5" }
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: vault-system
  annotations: { argocd.argoproj.io/sync-wave: "5" }
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: vault-system
  annotations: { argocd.argoproj.io/sync-wave: "5" }
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - { protocol: UDP, port: 5353 }
        - { protocol: TCP, port: 5353 }
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
  namespace: vault-system
  annotations: { argocd.argoproj.io/sync-wave: "5" }
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
---
