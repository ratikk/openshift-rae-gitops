# =============================================================================
# clustersecretstore.yaml — ESO connects to Vault via Kubernetes auth method
#
# Previously this used tokenSecretRef pointing at a 'vault-root-token' Secret
# that nobody created — ESO would never authenticate. This version uses the
# Kubernetes auth method that the vault-bootstrap Job configures:
#
#   1. ESO's controller pod presents its ServiceAccount JWT to Vault.
#   2. Vault's k8s auth method verifies the JWT against the K8s API.
#   3. Vault sees the SA matches role 'eso', issues a token with policy
#      'eso-reader' (read on secret/* paths).
#   4. ESO uses that token to fetch secrets, refreshing as needed.
#
# This pattern is identical to what HHSC's real Vault deployment will use —
# only the 'server' URL and 'role' name change between environments.
# =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: lab-vault
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    vault:
      server: "http://vault.vault-system.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          # Mount path of the auth method in Vault (default 'kubernetes')
          mountPath: "kubernetes"
          # Vault role created by vault-bootstrap Job
          role: "eso"
          # Use the ESO controller's own ServiceAccount JWT
          serviceAccountRef:
            name: external-secrets-operator-controller-manager
            namespace: external-secrets
