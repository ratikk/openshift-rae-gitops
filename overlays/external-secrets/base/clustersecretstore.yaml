# ClusterSecretStore — tells ESO where to fetch secrets from.
# Points at the lab Vault running in vault-system namespace.
#
# In HHSC production, replace `server` with the real HHS Vault URL.
# Auth method: tokenSecretRef for the lab. Production likely uses Kubernetes
# auth method, AppRole, or AWS IAM auth depending on environment.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: lab-vault
  annotations:
    # Wave 5: applies AFTER the Subscription has had time to install the
    # operator and register CRDs. A higher wave number gives more buffer
    # since OLM operator installs can take 60-180s after Subscription apply.
    argocd.argoproj.io/sync-wave: "5"
    # SkipDryRunOnMissingResource: at sync planning time, Argo CD does a
    # server-side dry-run to validate manifests. The external-secrets.io
    # CRD won't exist yet on first install, so dry-run would fail.
    # This annotation tells Argo CD to skip dry-run for this resource.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    vault:
      server: "http://vault.vault-system.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-root-token
          namespace: external-secrets
          key: token
