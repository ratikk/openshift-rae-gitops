# ESO supports both OwnNamespace and AllNamespaces. AllNamespaces (spec: {})
# is the HHSC pattern — secrets can be created in any namespace.
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: external-secrets-og
  namespace: external-secrets
  annotations:
    # Wave -1: after the namespace exists, before the Subscription.
    argocd.argoproj.io/sync-wave: "-1"
spec: {}
