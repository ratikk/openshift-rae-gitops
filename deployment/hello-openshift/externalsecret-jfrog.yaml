# =============================================================================
# externalsecret-jfrog.yaml — JFrog pull credentials via External Secrets
#
# The image-pull Secret for the private JFrog registry is NEVER committed to
# git. Instead the JFrog username/password (or API token) live in Vault, and
# this ExternalSecret tells ESO to fetch them and build a dockerconfigjson
# Secret named 'jfrog-pull' in each idev namespace. The chart's
# imagePullSecret value references that Secret.
#
# PREREQ — store the creds in Vault once (root token, dev mode):
#   vault kv put secret/jfrog \
#     username='<jfrog-user>' \
#     password='<jfrog-token>' \
#     host='<your-jfrog-host>'
#
# ESO reads secret/data/jfrog (KV v2) via the lab-vault ClusterSecretStore and
# renders .dockerconfigjson with the template below. One ExternalSecret per
# namespace (ExternalSecret is namespaced; lab-vault is cluster-wide).
#
# This file is illustrative for idev1; replicate per namespace (idev2/idev3)
# by changing metadata.namespace, or generate via the ApplicationSet.
# =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jfrog-pull
  namespace: idev1
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: lab-vault            # the ClusterSecretStore you validated
    kind: ClusterSecretStore
  target:
    name: jfrog-pull           # ← the Secret the chart's imagePullSecret names
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # ESO renders this dockerconfigjson from the Vault values below.
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .host }}": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: jfrog            # → secret/data/jfrog in Vault (KV v2)
        property: username
    - secretKey: password
      remoteRef:
        key: jfrog
        property: password
    - secretKey: host
      remoteRef:
        key: jfrog
        property: host
