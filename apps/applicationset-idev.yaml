# =============================================================================
# apps/applicationset-idev.yaml — per-env release via per-env values files
#
# RELEASE MODEL (HHS-style):
#   Jenkins  → builds image, pushes to JFrog
#   Engineer → edits image.tag in deployment/hello-openshift/values-idevN.yaml,
#              commits, pushes
#   Argo CD  → sees the one-line diff, auto-syncs that ONE environment (~3 min)
#
# Each generated Application points at the SAME chart but loads a DIFFERENT
# per-env values file (values-idev1.yaml, etc.) via helm.valueFiles. That is
# what makes idev1/2/3 independent release streams: bumping idev1's tag does
# not touch idev2 or idev3.
#
# "Trigger only on tag change" is automatic: Argo only syncs when the desired
# state in git differs from the cluster. No tag change → no diff → no deploy.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: idev-hello-openshift
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - list:
        elements:
          - env: idev1
          - env: idev2
          - env: idev3

  template:
    metadata:
      name: '{{.env}}-hello-openshift'
      labels:
        idev-env: '{{.env}}'
    spec:
      project: rae-lab-project
      source:
        repoURL: https://github.com/ratikk/openshift-rae-gitops.git
        targetRevision: main
        path: deployment/hello-openshift
        helm:
          # Load base values, then the per-env override file. Later files win,
          # so values-idevN.yaml's image.tag overrides the base.
          valueFiles:
            - values.yaml
            - 'values-{{.env}}.yaml'
      destination:
        name: idev                      # the registered spoke cluster (by name)
        namespace: '{{.env}}'
      syncPolicy:
        automated:                      # AUTO-SYNC: tag commit → deploy
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - Validate=true
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
