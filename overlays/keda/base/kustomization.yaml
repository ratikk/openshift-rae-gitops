apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openshift-keda

# Sync wave ordering is set per-resource via metadata.annotations:
#   namespace.yaml             → wave -2
#   operatorgroup.yaml         → wave -1
#   subscription.yaml          → wave  0  (OLM installs operator after this)
#   keda-controller.yaml       → wave  5  (CRDs from operator must exist by now)
# Argo CD waits for each wave to be Healthy before starting the next.

resources:
  - namespace.yaml
  - operatorgroup.yaml
  - subscription.yaml
  - keda-controller.yaml
