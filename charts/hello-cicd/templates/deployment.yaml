# hello-cicd — templated Deployment. One file, all environments render it with
# their own values. Names/labels come from _helpers.tpl (idiomatic Helm); the
# SELECTOR is kept exactly as before (app + environment) so upgrades don't hit
# the immutable-selector error on the running deployments.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hello-cicd.fullname" . }}
  namespace: {{ .Values.env.namespace }}
  labels:
    {{- include "hello-cicd.labels" . | nindent 4 }}
    release: "{{ .Values.image.tag }}"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hello-cicd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hello-cicd.selectorLabels" . | nindent 8 }}
        release: "{{ .Values.image.tag }}"
    spec:
      containers:
        - name: {{ include "hello-cicd.name" . }}
          image: "{{ include "hello-cicd.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 8080, name: http }
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.name | quote }}
            - name: RELEASE
              value: {{ .Values.image.tag | quote }}
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
