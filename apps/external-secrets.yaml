# =============================================================================
# apps/external-secrets.yaml — External Secrets Operator (UPSTREAM HELM CHART)
#
# Replaces the previous community-operators OLM Subscription install with the
# upstream Helm chart from https://charts.external-secrets.io.
#
# Why the pivot:
#   - community-operators packaging used a two-layer wrapper (helm-operator
#     watching OperatorConfig CR), which is now ARCHIVED upstream:
#     https://github.com/external-secrets/external-secrets-helm-operator
#   - Wrapper kept generating stale "InstallPlanFailed" conditions that
#     blocked Argo CD from advancing through sync waves
#   - Upstream chart is one-layer, simpler, actively maintained
#
# Why pin to 0.11.0:
#   - Matches the ESO version the previous wrapper was deploying
#   - Stays on v1beta1 CRD API (avoiding the v1beta1→v1 conversion that
#     happens in 0.16.x+ which causes Argo CD drift loops in GitOps shops)
#   - Migration to chart 2.5.0 + CR v1 is a separate, planned exercise
#
# Multi-source pattern (mirrors apps/vault.yaml.disabled):
#   Source 1: upstream Helm chart from charts.external-secrets.io
#   Source 2: local overlay (namespace labels, ClusterSecretStore for Vault)
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  sources:
    # Source 1: upstream External Secrets Operator Helm chart
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 0.11.0
      helm:
        releaseName: external-secrets
        values: |
          # Install CRDs as part of the chart (default true, made explicit)
          installCRDs: true
          # Single replica is fine for lab
          replicaCount: 1
          # Disable cert-controller for now (would deploy a second pod;
          # ESO uses webhook for ClusterSecretStore validation but works
          # without the cert-controller bootstrapping certs separately)
          certController:
            create: true
          webhook:
            create: true
          # Resource requests sized for lab
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi

    # Source 2: local overlay (slim — just namespace + ClusterSecretStore)
    - repoURL: https://github.com/ratikk/openshift-rae-gitops.git
      targetRevision: main
      path: overlays/external-secrets/base

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: false      # Don't auto-delete; we'll manually clean OLM remnants
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        maxDuration: 5m
        factor: 2
