# ============ openshift-gitops ============
# NOTE: openshift-gitops hosts Argo CD, which must reach the kube-apiserver (egress to
# the host network / API) and Git over HTTPS. A blanket egress-deny here can wedge Argo's
# ability to reconcile. We allow same-ns + DNS + broad egress for gitops specifically,
# and only restrict INGRESS. This is the safest posture for the controller namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: openshift-gitops
  annotations: { argocd.argoproj.io/sync-wave: "5" }
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: openshift-gitops
  annotations: { argocd.argoproj.io/sync-wave: "5" }
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-and-router-ingress
  namespace: openshift-gitops
  annotations: { argocd.argoproj.io/sync-wave: "5" }
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
        # Argo UI/route reachability via the ingress routers.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
