# =============================================================================
# vault-bootstrap-job.yaml — automate Vault init + unseal + auth method setup
#
# Dev-mode aware: when Vault runs with server.dev.enabled=true, the chart
# auto-initializes and auto-unseals with a fixed root token. This Job
# detects that case and skips init/unseal, then configures Kubernetes auth
# method against the dev root token.
#
# Non-dev (production-shape) flow:
#   1. Wait for Vault HTTP API
#   2. Init Vault if not initialized, persist payload to vault-init-credentials
#   3. Unseal Vault using stored keys
#   4. Enable Kubernetes auth method
#   5. Create eso-reader policy + eso role
#
# Idempotent. Runs as PostSync hook so it re-runs after each Argo sync.
# =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap
  namespace: vault-system
  annotations:
    argocd.argoproj.io/sync-wave: "9"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-bootstrap
  namespace: vault-system
  annotations:
    argocd.argoproj.io/sync-wave: "9"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-init-credentials"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-bootstrap
  namespace: vault-system
  annotations:
    argocd.argoproj.io/sync-wave: "9"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-bootstrap
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap
    namespace: vault-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: vault-system
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: vault-bootstrap
    spec:
      serviceAccountName: vault-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          # Switched from bitnami/kubectl:1.31 (returned ErrImagePull,
          # likely docker.io rate limiting or tag changes).
          # Using kubernetes.io official kubectl image — no auth needed,
          # no rate limits, kubectl binary at /bin/kubectl.
          # (Tried origin-cli first but kubectl symlink not guaranteed there.)
          image: docker.io/bitnami/kubectl:1.31
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault-system.svc:8200"
            - name: VAULT_INIT_SECRET
              value: "vault-init-credentials"
            - name: NAMESPACE
              value: "vault-system"
            - name: ESO_SA_NAME
              # Updated to match the upstream Helm chart's controller SA
              # (replaced the OLM wrapper SA: external-secrets-operator-controller-manager)
              value: "external-secrets"
            - name: ESO_SA_NAMESPACE
              value: "external-secrets"
            - name: DEV_ROOT_TOKEN
              value: "root"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "==> [1/5] Waiting for Vault HTTP API to respond..."
              for i in $(seq 1 60); do
                code=$(curl -s -o /dev/null -w "%{http_code}" "$VAULT_ADDR/v1/sys/health?standbyok=true&sealedok=true&uninitcode=200" || echo "000")
                if [ "$code" != "000" ]; then
                  echo "  Vault responds: HTTP $code"
                  break
                fi
                if [ $((i % 6)) -eq 0 ]; then echo "  [$((i*5))s] still waiting..."; fi
                sleep 5
              done

              echo "==> [2/5] Checking init status..."
              INIT_STATUS=$(curl -s "$VAULT_ADDR/v1/sys/init")
              IS_INITIALIZED=$(echo "$INIT_STATUS" | grep -oE '"initialized":(true|false)' | cut -d: -f2)
              echo "  initialized=$IS_INITIALIZED"

              ROOT_TOKEN=""

              if [ "$IS_INITIALIZED" = "false" ]; then
                # PRODUCTION-SHAPE PATH (no auto-init): we initialize + persist keys
                echo "  Vault is NOT initialized. Initializing..."
                INIT_RESP=$(curl -s -X POST -d '{"secret_shares":5,"secret_threshold":3}' "$VAULT_ADDR/v1/sys/init")
                echo "$INIT_RESP" > /tmp/init.json

                kubectl -n "$NAMESPACE" create secret generic "$VAULT_INIT_SECRET" \
                  --from-file=init.json=/tmp/init.json \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  Init payload saved to Secret $VAULT_INIT_SECRET"

                ROOT_TOKEN=$(grep -oE '"root_token":"[^"]+"' /tmp/init.json | sed 's/"root_token":"//;s/"//')
              else
                # DEV-MODE PATH OR ALREADY-INITIALIZED:
                # If the vault-init-credentials Secret exists, use its root token.
                # Otherwise (e.g. dev mode where chart auto-inits), use the known
                # dev root token from env.
                echo "  Vault already initialized."
                if kubectl -n "$NAMESPACE" get secret "$VAULT_INIT_SECRET" >/dev/null 2>&1; then
                  echo "  Found existing init credentials Secret"
                  kubectl -n "$NAMESPACE" get secret "$VAULT_INIT_SECRET" \
                    -o jsonpath='{.data.init\.json}' | base64 -d > /tmp/init.json
                  ROOT_TOKEN=$(grep -oE '"root_token":"[^"]+"' /tmp/init.json | sed 's/"root_token":"//;s/"//')
                else
                  echo "  No init credentials Secret found — assuming dev mode."
                  ROOT_TOKEN="$DEV_ROOT_TOKEN"
                fi
              fi

              echo "==> [3/5] Checking seal status..."
              SEAL_STATUS=$(curl -s "$VAULT_ADDR/v1/sys/seal-status")
              IS_SEALED=$(echo "$SEAL_STATUS" | grep -oE '"sealed":(true|false)' | cut -d: -f2)

              if [ "$IS_SEALED" = "true" ] && [ -f /tmp/init.json ]; then
                echo "  Vault is sealed. Applying 3 unseal keys..."
                for i in 0 1 2; do
                  KEY=$(grep -oE '"keys_base64":\[[^]]+\]' /tmp/init.json \
                        | sed 's/"keys_base64":\[//;s/\]$//' \
                        | tr ',' '\n' | sed -n "$((i+1))p" | tr -d '"')
                  curl -s -X POST -d "{\"key\":\"$KEY\"}" "$VAULT_ADDR/v1/sys/unseal" > /dev/null
                done
                echo "  Unseal complete."
              else
                echo "  Vault not sealed (or dev mode auto-unseal)."
              fi

              echo "==> [4/5] Verifying root token works..."
              if [ -z "$ROOT_TOKEN" ]; then
                echo "ERROR: no root token available" >&2
                exit 1
              fi
              VERIFY=$(curl -s -H "X-Vault-Token: $ROOT_TOKEN" "$VAULT_ADDR/v1/sys/auth")
              echo "$VERIFY" | grep -q '"errors"' && {
                echo "ERROR: root token rejected by Vault. Response: $VERIFY" >&2
                exit 1
              }

              echo "==> [5/5] Configuring Kubernetes auth method..."

              # Enable k8s auth (idempotent)
              curl -s -H "X-Vault-Token: $ROOT_TOKEN" -X POST \
                -d '{"type":"kubernetes"}' \
                "$VAULT_ADDR/v1/sys/auth/kubernetes" > /tmp/auth-enable.resp || true

              # Configure k8s auth to talk to the cluster API
              curl -s -H "X-Vault-Token: $ROOT_TOKEN" -X POST \
                -d "{\"kubernetes_host\":\"https://kubernetes.default.svc\"}" \
                "$VAULT_ADDR/v1/auth/kubernetes/config" > /tmp/auth-config.resp

              # Write eso-reader policy
              POLICY='path "secret/data/*" { capabilities = ["read","list"] } path "secret/metadata/*" { capabilities = ["read","list"] }'
              POLICY_JSON=$(printf '{"policy":"%s"}' "$POLICY")
              curl -s -H "X-Vault-Token: $ROOT_TOKEN" -X PUT \
                -d "$POLICY_JSON" \
                "$VAULT_ADDR/v1/sys/policies/acl/eso-reader" > /tmp/policy.resp

              # Write k8s auth role 'eso'
              ROLE_JSON=$(printf '{"bound_service_account_names":"%s","bound_service_account_namespaces":"%s","policies":"eso-reader","ttl":"24h"}' \
                "$ESO_SA_NAME" "$ESO_SA_NAMESPACE")
              curl -s -H "X-Vault-Token: $ROOT_TOKEN" -X POST \
                -d "$ROLE_JSON" \
                "$VAULT_ADDR/v1/auth/kubernetes/role/eso" > /tmp/role.resp

              echo "==> Done. Vault is initialized, unsealed, and configured for ESO."
              curl -s -H "X-Vault-Token: $ROOT_TOKEN" "$VAULT_ADDR/v1/sys/seal-status" | head -5
              echo
              echo "==> [6/6] Restarting ESO so it re-reads the freshly-seeded Vault..."
              kubectl -n "$ESO_SA_NAMESPACE" rollout restart deploy/external-secrets
              kubectl -n "$ESO_SA_NAMESPACE" rollout status  deploy/external-secrets --timeout=180s
              echo "==> ESO restarted."
