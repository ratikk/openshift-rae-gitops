# SA used by the backup CronJob. The IRSA annotation is a PLACEHOLDER.
#
# >>> ACTION REQUIRED (Step 7.12, post-install) <<<
# 1. terraform output -raw etcd_backup_role_arn  -> replace __ETCD_BACKUP_ROLE_ARN__
# 2. The Terraform role trust is currently a placeholder (ec2.amazonaws.com). After the
#    cluster exists, swap its trust policy to FEDERATE the cluster OIDC provider:
#      Principal: { "Federated": "<oidc_provider_arn>" }
#      Condition StringEquals:
#        "<oidc_host>:sub": "system:serviceaccount:openshift-etcd-backup:etcd-backup"
#    Until both are done, aws s3 cp will fail with credentials errors — backups won't land.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-backup
  namespace: openshift-etcd-backup
  annotations:
    eks.amazonaws.com/role-arn: __ETCD_BACKUP_ROLE_ARN__
    argocd.argoproj.io/sync-wave: "0"
