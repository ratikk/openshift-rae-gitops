# =============================================================================
# apps/applicationset-idev.yaml — Phase 2 · multi-cluster ApplicationSet
#
# Lives in apps/ so app-of-apps picks it up automatically (survives rebuilds).
#
# Generates THREE Argo CD Applications — idev1, idev2, idev3 — from one
# list generator. Each deploys the hello-openshift Helm chart (same chart as
# apps/hello-openshift.yaml) into its own namespace ON THE SPOKE cluster.
#
# Targets the spoke by NAME (destination.name: idev), which is the name the
# cluster Secret registered via register-spoke-to-hub.yml uses. This is why we
# use destination.name (not server URL) — the name is stable across spoke
# rebuilds even though the API URL/CA change.
#
# Proves P2-A-07 (3 generated apps) and P2-A-08 (3 hello-openshift instances
# running on the spoke, one per idev namespace).
#
# PREREQS:
#   - Spoke registered to the hub Argo CD (cluster Secret name: idev).
#   - app-of-apps syncing apps/ on the hub.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: idev-hello-openshift
  namespace: openshift-gitops
  labels:
    name: idev-hello-openshift
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - list:
        elements:
          - namespace: idev1
          - namespace: idev2
          - namespace: idev3

  template:
    metadata:
      # Generated Application names: idev1-hello-openshift, etc.
      name: '{{.namespace}}-hello-openshift'
      labels:
        name: '{{.namespace}}-hello-openshift'
        idev-env: '{{.namespace}}'
    spec:
      project: rae-lab-project
      source:
        repoURL: https://github.com/ratikk/openshift-rae-gitops.git
        targetRevision: main
        path: deployment/hello-openshift
      destination:
        # Target the SPOKE by registered name (not in-cluster server URL).
        name: idev
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - Validate=true
          - CreateNamespace=true   # creates idev1/2/3 on the spoke on first sync
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
