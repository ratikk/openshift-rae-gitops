# Deploys the KEDA controller after the operator is installed.
# Single-instance, watches all namespaces by default.
---
apiVersion: keda.sh/v1alpha1
kind: KedaController
metadata:
  name: keda
  namespace: openshift-keda
  annotations:
    # Wave 5: after the operator has had time to install and register
    # the keda.sh CRDs (Subscription → InstallPlan → CSV → CRDs).
    argocd.argoproj.io/sync-wave: "5"
    # Skip dry-run on first install when keda.sh CRD doesn't exist yet.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  watchNamespace: ""
