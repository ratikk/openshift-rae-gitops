apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-idev3
  namespace: openshift-gitops
  labels:
    env: idev3
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: idev3
  # MULTI-SOURCE: the chart (implementation) and the env values (knobs) live in
  # different folders. We reference the repo twice — once as the value source
  # ($values), once as the chart, pulling valueFiles from the $values ref.
  sources:
    - repoURL: https://github.com/ratikk/openshift-rae-gitops.git
      targetRevision: main
      ref: values                       # name this ref so the chart can use it
    - repoURL: https://github.com/ratikk/openshift-rae-gitops.git
      targetRevision: main
      path: charts/hello-cicd            # the PURE chart
      helm:
        valueFiles:
          - $values/environments/idev3/values.yaml   # the env's knobs, from the other ref
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
