# L2 mode — ARP-based announcement. Works for in-cluster reachability.
# For cross-VPC or external reachability, you'd add the external NLB :443
# (configured separately by the Terraform/IngressController stack).
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: rae-l2adv
  namespace: metallb-system
  annotations:
    # Wave 10: same wave as IPAddressPool — both depend on MetalLB being up.
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  ipAddressPools:
    - rae-pool
